name: Build Engine and Run Unit Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        profile: [dev, release]
        feature: [headed, network]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo dependencies
      if: matrix.platform == 'linux'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Setup mold linker (Linux)
      if: matrix.platform == 'linux'
      uses: rui314/setup-mold@v1
    - name: Install Vulkan runtime dependencies (Linux)
      if: matrix.platform == 'linux'
      run: sudo add-apt-repository ppa:kisak/kisak-mesa && sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools vulkan-validationlayers
    - name: Install ALSA development libraries (Linux)
      if: matrix.platform == 'linux'
      run: sudo apt-get install libasound2-dev
    - name: Install additional Linux dependencies
      if: matrix.platform == 'linux'
      run: sudo apt-get install -y pkg-config libx11-dev libxcb1-dev libxrandr-dev libxi-dev libgl1-mesa-dev
    - name: Install Windows dependencies
      if: matrix.platform == 'windows'
      run: |
        # Install Visual Studio Build Tools if needed
        choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools"
      shell: powershell
    - name: Install Vulkan SDK
      if: matrix.feature != 'headless'
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: 1.3.204.0
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true
    - name: Build & Test
      run: cargo test --workspace --profile ${{ matrix.profile }} --no-default-features --features ${{ matrix.feature }} -- --skip render # All tests which require rendering are prefixed with "render" and are skipped here.
